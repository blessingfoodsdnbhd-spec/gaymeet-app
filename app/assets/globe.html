<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060a14; overflow: hidden; width: 100vw; height: 100vh; }
  #globe { width: 100vw; height: 100vh; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #fff;
    font-family: -apple-system, sans-serif; font-size: 14px; gap: 12px;
    background: #060a14; z-index: 10; pointer-events: none;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,105,180,0.2);
    border-top-color: #ff69b4; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #tooltip {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(255,105,180,0.95); color: #fff; padding: 6px 16px;
    border-radius: 20px; font-family: -apple-system, sans-serif; font-size: 13px;
    font-weight: 600; pointer-events: none; opacity: 0;
    transition: opacity 0.2s; white-space: nowrap; max-width: 240px;
    overflow: hidden; text-overflow: ellipsis;
    box-shadow: 0 4px 16px rgba(255,105,180,0.4);
  }
  #count {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.7); padding: 4px 14px;
    border-radius: 12px; font-family: -apple-system, sans-serif; font-size: 12px;
    border: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
  }
  .legend {
    position: fixed; bottom: 24px; right: 16px;
    display: flex; flex-direction: column; gap: 6px;
    font-family: -apple-system, sans-serif; font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Cluster badges ───────────────────────────────────────────────────────── */
  .cluster-badge {
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.9);
    color: #fff; font-family: -apple-system, sans-serif;
    font-weight: 700; cursor: pointer; line-height: 1;
    box-shadow: 0 2px 14px rgba(0,0,0,0.55);
    transition: transform 0.12s;
    pointer-events: all;
    /* Outer ring pulse */
    position: relative;
  }
  .cluster-badge::before {
    content: ''; position: absolute; inset: -5px;
    border-radius: 50%; border: 2px solid rgba(255,105,180,0.35);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.8; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  .cluster-badge:active { transform: scale(0.88); }
  .cluster-sm { width: 38px; height: 38px; font-size: 12px; background: rgba(255,105,180,0.88); }
  .cluster-md { width: 50px; height: 50px; font-size: 15px; background: rgba(220,40,150,0.92); }
  .cluster-lg { width: 62px; height: 62px; font-size: 18px; background: rgba(175,15,115,0.96); }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>加载地球...</span></div>
<div id="globe"></div>
<div id="tooltip"></div>
<div id="count"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00ffcc"></div>用户(在线)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#555"></div>用户(离线)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff4444"></div>热门动态</div>
  <div class="legend-item"><div class="legend-dot" style="background:#44bb44"></div>普通动态</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffcc00"></div>推荐地点</div>
</div>

<script src="https://unpkg.com/globe.gl@2/dist/globe.gl.min.js"></script>
<script src="https://unpkg.com/supercluster@8/dist/supercluster.min.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let myGlobe = null;
let rawPoints = [];
let scIndex = null;
const flashSet = new Set();
const tooltip = document.getElementById('tooltip');
const countEl = document.getElementById('count');

// ── Altitude thresholds for zoom levels ──────────────────────────────────────
// Level 1 (city clusters):        altitude > 2.0
// Level 2 (neighbourhood):  0.5 < altitude ≤ 2.0
// Level 3 (individual dots):      altitude ≤ 0.5
const LVL2_ALT = 2.0;
const LVL3_ALT = 0.5;

// ── Heat score ────────────────────────────────────────────────────────────────
function heatScore(p) {
  const ageMin = (Date.now() - new Date(p.createdAt).getTime()) / 60000;
  return (p.likeCount || 0) * 2 + (p.commentsCount || 0) * 3 + (ageMin < 10 ? 50 : 0);
}

// ── Privacy jitter ────────────────────────────────────────────────────────────
function jitter(v) { return v + (Math.random() - 0.5) * 0.04; }

// ── Individual point styling ──────────────────────────────────────────────────
function pointColor(d) {
  if (flashSet.has(d.id)) return '#ffffff';
  switch (d.type) {
    case 'user':  return d.isOnline ? '#00ffcc' : '#555555';
    case 'post':  return heatScore(d) > 50 ? '#ff4444' : '#44bb44';
    case 'place': return d.isPromoted ? '#ffcc00' : '#888888';
    default:      return '#ffffff';
  }
}
function pointRadius(d) {
  switch (d.type) {
    case 'user':  return 0.3;
    case 'post':  return 0.4;
    case 'place': return 0.5;
    default:      return 0.3;
  }
}
function pointLabel(d) {
  if (d.type === 'user')  return d.nickname || '用户';
  if (d.type === 'post')  return d.content  || '动态';
  if (d.type === 'place') return d.name     || '地点';
  return '';
}

// ── altitude → Supercluster zoom ─────────────────────────────────────────────
// Cluster mode (alt > LVL3_ALT): low zoom → big city clusters
// Dot mode    (alt ≤ LVL3_ALT): high zoom → individual points visible
function altToZoom(alt) {
  if (alt <= LVL3_ALT) {
    // Scale from zoom 10 at LVL3_ALT down to zoom 14 at alt 0
    return Math.min(14, Math.round(10 + (LVL3_ALT - alt) * 10));
  }
  return Math.max(0, Math.min(9, Math.round(7 - alt * 2.2)));
}

// ── Rebuild Supercluster index ────────────────────────────────────────────────
function rebuildIndex() {
  if (typeof Supercluster === 'undefined') return;
  scIndex = new Supercluster({ radius: 55, maxZoom: 14, minPoints: 2 });
  scIndex.load(rawPoints.map((p) => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
    properties: p,
  })));
}

// ── Build cluster HTML badge element ─────────────────────────────────────────
function makeClusterEl(d) {
  const count = d.count;
  const cls = count >= 50 ? 'cluster-lg' : count >= 10 ? 'cluster-md' : 'cluster-sm';
  const label = count >= 1000 ? (count / 1000).toFixed(1) + 'k' : String(count);
  const el = document.createElement('div');
  el.className = `cluster-badge ${cls}`;
  el.textContent = label;
  el.title = `${count} 个点`;
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    zoomToCluster(d);
  });
  return el;
}

// ── Zoom into a cluster (click handler) ──────────────────────────────────────
function zoomToCluster(cluster) {
  if (!myGlobe) return;
  const { altitude } = myGlobe.pointOfView();
  // Each click zooms in by 60%
  const newAlt = Math.max(0.25, altitude * 0.4);
  myGlobe.pointOfView({ lat: cluster.lat, lng: cluster.lng, altitude: newAlt }, 800);
}

// ── Refresh globe display based on current altitude ───────────────────────────
let _refreshing = false;
function refreshPoints() {
  if (!myGlobe || !scIndex || _refreshing) return;
  _refreshing = true;

  const { altitude } = myGlobe.pointOfView();
  const zoom = altToZoom(altitude);
  const features = scIndex.getClusters([-180, -85, 180, 85], zoom);

  const clusterData = [];
  const pointData = [];

  features.forEach((f) => {
    const [lng, lat] = f.geometry.coordinates;
    if (f.properties.cluster) {
      clusterData.push({ lat, lng, clusterId: f.id, count: f.properties.point_count });
    } else {
      pointData.push({ lat, lng, ...f.properties });
    }
  });

  if (altitude > LVL3_ALT) {
    myGlobe.pointsData([]);
    myGlobe.htmlElementsData(clusterData);
  } else {
    myGlobe.htmlElementsData([]);
    myGlobe.pointsData(pointData);
  }
  _refreshing = false;
}

// ── Init globe.gl ─────────────────────────────────────────────────────────────
function initGlobe() {
  myGlobe = Globe()
    (document.getElementById('globe'))
    .backgroundColor('#060a14')
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .atmosphereColor('#1a6eff')
    .atmosphereAltitude(0.15)

    // ── Individual points (Level 3) ──────────────────────────────────────────
    .pointsData([])
    .pointLat((d) => d.lat)
    .pointLng((d) => d.lng)
    .pointColor(pointColor)
    .pointRadius(pointRadius)
    .pointAltitude(0.01)
    .onPointClick((point) => {
      if (!point) return;
      tooltip.style.opacity = '0';
      try {
        if (point.type === 'user'  && window.UserTapped)  window.UserTapped.postMessage(point.id);
        if (point.type === 'post'  && window.PostTapped)  window.PostTapped.postMessage(point.id);
        if (point.type === 'place' && window.PlaceTapped) window.PlaceTapped.postMessage(point.id);
      } catch (_) {}
    })
    .onPointHover((point) => {
      tooltip.textContent = point ? pointLabel(point) : '';
      tooltip.style.opacity = point ? '1' : '0';
    })

    // ── Cluster HTML badges (Levels 1 & 2) ──────────────────────────────────
    .htmlElementsData([])
    .htmlLat((d) => d.lat)
    .htmlLng((d) => d.lng)
    .htmlAltitude(0.02)
    .htmlElement(makeClusterEl);

  // Re-cluster on camera move
  myGlobe.controls().addEventListener('change', refreshPoints);

  // Auto-rotate
  myGlobe.controls().autoRotate = true;
  myGlobe.controls().autoRotateSpeed = 0.4;
  myGlobe.controls().addEventListener('start', () => {
    myGlobe.controls().autoRotate = false;
  });

  window.addEventListener('resize', () => {
    myGlobe.width(window.innerWidth).height(window.innerHeight);
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initGlobe);
} else {
  initGlobe();
}

// ── Flutter → JS bridge ───────────────────────────────────────────────────────
window.loadPoints = function(jsonStr) {
  document.getElementById('loading').style.display = 'none';
  try {
    const data = JSON.parse(jsonStr);
    const { users = [], posts = [], places = [], userLat, userLng } = data;

    const userPoints = users.map((u) => ({
      ...u, type: 'user',
      lat: u.privacy === 'blur' ? jitter(u.lat) : u.lat,
      lng: u.privacy === 'blur' ? jitter(u.lng) : u.lng,
    }));
    const postPoints  = posts.map((p)  => ({ ...p,  type: 'post'  }));
    const placePoints = places.map((pl) => ({ ...pl, type: 'place' }));

    rawPoints = [...userPoints, ...postPoints, ...placePoints];
    rebuildIndex();
    refreshPoints();

    countEl.textContent = `${users.length} 用户 · ${posts.length} 动态 · ${places.length} 地点`;

    if (userLat != null && userLng != null && myGlobe) {
      myGlobe.pointOfView({ lat: userLat, lng: userLng, altitude: 2 }, 1200);
    }
  } catch (e) {
    console.error('loadPoints:', e);
  }
};

// Legacy: array of user objects
window.loadUsers = function(jsonStr) {
  document.getElementById('loading').style.display = 'none';
  try {
    const list = JSON.parse(jsonStr);
    rawPoints = list
      .filter((u) => u.lat != null && u.lng != null)
      .map((u) => ({ ...u, type: 'user' }));
    rebuildIndex();
    refreshPoints();
    countEl.textContent = list.length + ' 位用户';
  } catch (e) {
    console.error('loadUsers:', e);
  }
};

window.showEmpty = function() {
  document.getElementById('loading').style.display = 'none';
  countEl.textContent = '暂无位置数据';
};

// Flash a point white for 800ms on live socket push
window.flashPoint = function(id) {
  flashSet.add(id);
  refreshPoints();
  setTimeout(() => { flashSet.delete(id); refreshPoints(); }, 800);
};

// Add a single new point live
window.addPoint = function(jsonStr) {
  try {
    const p = JSON.parse(jsonStr);
    rawPoints.push(p);
    rebuildIndex();
    window.flashPoint(p.id);
  } catch (e) {}
};
</script>
</body>
</html>
