<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #fff;
    font-family: -apple-system, sans-serif; font-size: 14px; gap: 12px;
    background: #0a0a12;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,105,180,0.2);
    border-top-color: #ff69b4; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #tooltip {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(255,105,180,0.9); color: #fff; padding: 6px 14px;
    border-radius: 20px; font-family: -apple-system, sans-serif; font-size: 13px;
    font-weight: 600; pointer-events: none; opacity: 0;
    transition: opacity 0.2s; white-space: nowrap; max-width: 220px;
    overflow: hidden; text-overflow: ellipsis;
  }
  #count {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
    padding: 4px 12px; border-radius: 12px;
    font-family: -apple-system, sans-serif; font-size: 12px;
  }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>加载地球...</span></div>
<div id="tooltip"></div>
<div id="count"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Scene setup ──────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
camera.position.set(0, 0, 2.8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a12, 1);
document.body.appendChild(renderer.domElement);

// ── Lights ───────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x334466, 1.2);
scene.add(ambient);
const sunLight = new THREE.DirectionalLight(0x6699ff, 2.0);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// ── Globe ────────────────────────────────────────────────────────────────────
const RADIUS = 1.0;
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Ocean sphere
const oceanGeo = new THREE.SphereGeometry(RADIUS, 64, 64);
const oceanMat = new THREE.MeshPhongMaterial({
  color: 0x0d1b3e,
  shininess: 60,
  specular: new THREE.Color(0x2244aa),
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
globeGroup.add(ocean);

// Wireframe overlay (subtle grid)
const wireGeo = new THREE.SphereGeometry(RADIUS * 1.001, 24, 24);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x1a3a6a,
  wireframe: true,
  transparent: true,
  opacity: 0.18,
});
globeGroup.add(new THREE.Mesh(wireGeo, wireMat));

// Atmosphere glow (additive shell)
const atmoGeo = new THREE.SphereGeometry(RADIUS * 1.12, 64, 64);
const atmoMat = new THREE.MeshPhongMaterial({
  color: 0x1155cc,
  transparent: true,
  opacity: 0.18,
  side: THREE.BackSide,
});
globeGroup.add(new THREE.Mesh(atmoGeo, atmoMat));

// Thin rim glow
const rimGeo = new THREE.SphereGeometry(RADIUS * 1.04, 64, 64);
const rimMat = new THREE.MeshBasicMaterial({
  color: 0x3377ff,
  transparent: true,
  opacity: 0.07,
  side: THREE.BackSide,
});
globeGroup.add(new THREE.Mesh(rimGeo, rimMat));

// ── Stars ────────────────────────────────────────────────────────────────────
const starVerts = [];
for (let i = 0; i < 2000; i++) {
  const r = 80 + Math.random() * 20;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starVerts.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.18, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ── User dots ────────────────────────────────────────────────────────────────
const DOT_R = RADIUS * 1.012;
const users = [];         // { id, nickname, mesh, ring }
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.05 };
const dotObjects = [];    // THREE.Mesh refs for raycasting

function latLngToVec3(lat, lng, r) {
  const phi   = (90 - lat)  * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function addUserDot(user) {
  const pos = latLngToVec3(user.lat, user.lng, DOT_R);

  // Glowing sphere
  const geo  = new THREE.SphereGeometry(0.018, 8, 8);
  const mat  = new THREE.MeshBasicMaterial({ color: 0xff69b4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.userData = { userId: user.id, nickname: user.nickname };
  globeGroup.add(mesh);
  dotObjects.push(mesh);

  // Halo ring around dot
  const ringGeo = new THREE.RingGeometry(0.022, 0.030, 16);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff69b4, transparent: true, opacity: 0.45, side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(new THREE.Vector3(0, 0, 0));
  ring.rotateX(Math.PI / 2);
  globeGroup.add(ring);

  users.push({ ...user, mesh, ring });
}

// ── Interaction ──────────────────────────────────────────────────────────────
let isDragging = false;
let prevMouse  = { x: 0, y: 0 };
let autoRotate = true;
let autoTimer  = null;
const tooltip  = document.getElementById('tooltip');

function showTooltip(name) {
  tooltip.textContent = name;
  tooltip.style.opacity = '1';
}
function hideTooltip() {
  tooltip.style.opacity = '0';
}

function getEventXY(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function getNDC(x, y) {
  return new THREE.Vector2(
    (x / window.innerWidth)  * 2 - 1,
   -(y / window.innerHeight) * 2 + 1
  );
}

function hitTest(x, y) {
  raycaster.setFromCamera(getNDC(x, y), camera);
  const hits = raycaster.intersectObjects(dotObjects);
  return hits.length > 0 ? hits[0].object : null;
}

renderer.domElement.addEventListener('pointerdown', e => {
  const { x, y } = getEventXY(e);
  isDragging = true;
  prevMouse  = { x, y };
  autoRotate = false;
  clearTimeout(autoTimer);
});

renderer.domElement.addEventListener('pointermove', e => {
  const { x, y } = getEventXY(e);
  if (isDragging) {
    const dx = (x - prevMouse.x) * 0.005;
    const dy = (y - prevMouse.y) * 0.005;
    globeGroup.rotation.y += dx;
    globeGroup.rotation.x += dy;
    globeGroup.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, globeGroup.rotation.x));
    prevMouse = { x, y };
    hideTooltip();
  } else {
    const hit = hitTest(x, y);
    if (hit) showTooltip(hit.userData.nickname);
    else hideTooltip();
  }
});

renderer.domElement.addEventListener('pointerup', e => {
  const { x, y } = getEventXY(e);
  const hit = hitTest(x, y);
  if (hit && !isDragging) {
    const id = hit.userData.userId;
    try {
      if (window.UserTapped) window.UserTapped.postMessage(id);
      else if (window.flutter_inappwebview) window.flutter_inappwebview.callHandler('UserTapped', id);
    } catch (_) {}
  }
  isDragging = false;
  autoTimer = setTimeout(() => { autoRotate = true; }, 3000);
});

renderer.domElement.addEventListener('click', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    try { if (window.UserTapped) window.UserTapped.postMessage(hit.userData.userId); } catch (_) {}
  }
});

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ── Pulse animation for dots ──────────────────────────────────────────────────
let tick = 0;

// ── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  tick += 0.02;

  if (autoRotate) globeGroup.rotation.y += 0.002;

  // Pulse dot opacity
  users.forEach((u, i) => {
    const p = 0.4 + 0.4 * Math.sin(tick + i * 0.7);
    u.ring.material.opacity = p * 0.5;
  });

  renderer.render(scene, camera);
}
animate();

// ── Public API called by Flutter ──────────────────────────────────────────────
window.loadUsers = function(jsonStr) {
  document.getElementById('loading').style.display = 'none';
  try {
    const list = JSON.parse(jsonStr);
    list.forEach(u => {
      if (u.lat != null && u.lng != null) addUserDot(u);
    });
    const el = document.getElementById('count');
    if (el) el.textContent = list.length + ' 位用户';
  } catch(e) {
    console.error('loadUsers error', e);
  }
};

window.showEmpty = function() {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('count');
  if (el) el.textContent = '暂无用户位置数据';
};
</script>
</body>
</html>
