name: gaymeet
description: Meetup Nearby - Social Dating App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP & networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2

  # Auth & storage
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # UI components
  flutter_card_swiper: ^7.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Routing
  go_router: ^14.6.2

  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.2
  timeago: ^3.7.0
  shared_preferences: ^2.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
