version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gaymeet-db
    environment:
      POSTGRES_DB: gaymeet
      POSTGRES_USER: gaymeet
      POSTGRES_PASSWORD: gaymeet_dev_password
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gaymeet-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
